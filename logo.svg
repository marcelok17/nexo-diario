<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Logo NEXO DIARIO - Profesional con fondo transparente -->
  
  <!-- Círculo exterior con gradiente -->
  <defs>
    <linearGradient id="gradientNexo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E31E24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003DA5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Fondo blanco opcional (comentado, descomentar si necesitas) -->
  <!-- <rect width="200" height="200" fill="white"/> -->
  
  <!-- Círculo principal con gradiente -->
  <circle cx="100" cy="100" r="85" fill="url(#gradientNexo)" filter="url(#shadow)"/>
  
  <!-- Símbolo de periódico/nexo: líneas entrecruzadas formando "X" + líneas horizontales -->
  
  <!-- Línea diagonal 1 (de arriba-izquierda a abajo-derecha) -->
  <line x1="50" y1="70" x2="150" y2="130" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Línea diagonal 2 (de arriba-derecha a abajo-izquierda) -->
  <line x1="150" y1="70" x2="50" y2="130" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Línea horizontal superior -->
  <line x1="60" y1="55" x2="140" y2="55" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Línea horizontal inferior -->
  <line x1="60" y1="145" x2="140" y2="145" stroke="white" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Punto central (nexo/conexión) -->
  <circle cx="100" cy="100" r="8" fill="white"/>
  
  <!-- Puntos en las esquinas del X -->
  <circle cx="50" cy="70" r="5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="70" r="5" fill="white" opacity="0.8"/>
  <circle cx="50" cy="130" r="5" fill="white" opacity="0.8"/>
  <circle cx="150" cy="130" r="5" fill="white" opacity="0.8"/>
</svg>
